name: Shadow Lab CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ─────────────────────────────────────────
  # 1. Valida o código Python do CLI
  # ─────────────────────────────────────────
  lint-python:
    name: Lint shadowlab.py
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint com flake8
        run: |
          # Erros críticos que param o build
          flake8 shadowlab.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Avisos de estilo (não param o build)
          flake8 shadowlab.py --count --exit-zero --max-line-length=120 --statistics

  # ─────────────────────────────────────────
  # 2. Valida o docker-compose.yml
  # ─────────────────────────────────────────
  validate-compose:
    name: Validar docker-compose.yml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Validar sintaxe do docker-compose.yml
        run: |
          docker-compose config --quiet
          echo "✅ docker-compose.yml válido"

  # ─────────────────────────────────────────
  # 3. Testa o CLI do Shadow Lab
  # ─────────────────────────────────────────
  test-cli:
    name: Testar shadowlab.py CLI
    runs-on: ubuntu-latest
    needs: lint-python

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Testar comando help
        run: |
          python shadowlab.py help
          echo "✅ help OK"

      - name: Testar comando info
        run: |
          python shadowlab.py info
          echo "✅ info OK"

      - name: Testar comando targets
        run: |
          python shadowlab.py targets
          echo "✅ targets OK"

  # ─────────────────────────────────────────
  # 4. Build dos containers Docker
  # ─────────────────────────────────────────
  docker-build:
    name: Build Docker containers
    runs-on: ubuntu-latest
    needs: validate-compose

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Build de todos os containers
        run: |
          docker-compose build --no-cache
          echo "✅ Todos os containers buildados com sucesso"

      - name: Verificar containers arrancam
        run: |
          docker-compose up -d
          sleep 15
          docker-compose ps
          echo "✅ Containers a correr"

      - name: Teardown
        if: always()
        run: |
          docker-compose down -v
          echo "🧹 Containers parados e limpos"
